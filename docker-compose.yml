services:
  anonymous-chatroom:
    build:
      context: .
    container_name: ${CONTAINER_NAME:-anonymous-chatroom}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      ROOM_ACCESS_PASSWORD: ${ROOM_ACCESS_PASSWORD:-dx333}
    ports:
      - "127.0.0.1:${APP_BIND_PORT:-3001}:3000"
